<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{views/layout/public_layout.html}">
<title>Job Board</title>

<body>
    <!-- ===== Browse Job ===== -->
    <main layout:fragment="content" class="container-fluid px-lg-5 py-5">
        <div class="row g-4">

            <!-- ---------- Filter sidebar ---------- -->
            <aside class="col-lg-3">
                <div class="bg-white rounded-3 shadow-sm p-4">
                    <h5 class="fw-semibold mb-4">Filter</h5>

                    <form th:action="@{/public/jobs/browse}" method="get" th:object="${browseRequest}"
                        class="d-grid gap-3">
                        <input type="text" name="keyword" th:value="${param.keyword}" class="form-control"
                            placeholder="Search keyword">

                        <select class="form-select text-muted" name="location">
                            <option value="" th:selected="${param.location == null or param.location.length == 0}">
                                --Location--</option>
                            <option value="Ha Noi"
                                th:selected="${param.location != null and param.location[0] == 'Ha Noi'}">Hà Nội
                            </option>
                            <option value="Ho Chi Minh"
                                th:selected="${param.location != null and param.location[0] == 'Ho Chi Minh'}">Hồ Chí
                                Minh</option>
                            <option value="Da Nang"
                                th:selected="${param.location != null and param.location[0] == 'Da Nang'}">Đà Nẵng
                            </option>
                        </select>


                        <select class="form-select text-muted" name="experience">
                            <option value="" th:selected="${param.experience == null or param.experience.length == 0}">
                                --Experience--</option>
                            <option value="fresher"
                                th:selected="${param.experience != null and param.experience[0] == 'fresher'}">Fresher
                            </option>
                            <option value="junior"
                                th:selected="${param.experience != null and param.experience[0] == 'junior'}">Junior
                            </option>
                            <option value="senior"
                                th:selected="${param.experience != null and param.experience[0] == 'senior'}">Senior
                            </option>
                        </select>

                        <select class="form-select text-muted" name="jobType">
                            <option value="" th:selected="${param.jobType == null or param.jobType.length == 0}">--Job
                                type--</option>
                            <option value="full-time"
                                th:selected="${param.jobType != null and param.jobType[0] == 'full-time'}">Full-time
                            </option>
                            <option value="part-time"
                                th:selected="${param.jobType != null and param.jobType[0] == 'part-time'}">Part-time
                            </option>
                            <option value="remote"
                                th:selected="${param.jobType != null and param.jobType[0] == 'remote'}">Remote
                            </option>
                        </select>

                        <select class="form-select text-muted" name="qualification">
                            <option value=""
                                th:selected="${param.qualification == null or param.qualification.length == 0}">
                                Qualification</option>
                            <option value="bachelor"
                                th:selected="${param.qualification != null and param.qualification[0] == 'bachelor'}">
                                Bachelor</option>
                            <option value="master"
                                th:selected="${param.qualification != null and param.qualification[0] == 'master'}">
                                Master</option>
                            <option value="other"
                                th:selected="${param.qualification != null and param.qualification[0] == 'other'}">Other
                            </option>
                        </select>


                        <div>
                            <label class="form-label fw-medium mb-2">Price range:</label>
                            <input type="range" class="form-range jb-range" min="0" max="50000"
                                th:value="${param.priceRange} ?: 0" name="priceRange">
                            <div class="jb-meta">$0 - $50000/ Year</div>
                        </div>

                        <a th:href="@{/public/jobs}" class="btn btn-jb w-100 mt-2 py-2">Reset</a>
                        <button type="submit" class="btn btn-jb w-100 mt-2 py-2">Filter</button>
                    </form>
                </div>
            </aside>

            <!-- ---------- Job listing ---------- -->
            <section class="col-lg-9">
                <!-- toolbar -->
                <div class="bg-white rounded-3 shadow-sm d-flex justify-content-between align-items-center p-4 mb-4">
                    <h5 class="fw-semibold mb-0">Job Listing</h5>
                    <select class="form-select w-auto" name="sort">
                        <option value="recent" selected>Most Recent</option>
                        <option value="oldest">Oldest</option>
                        <option value="salary">Highest Salary</option>
                    </select>
                </div>

                <!-- cards -->
                <div class="d-grid gap-3">

                    <!-- one card per job -->
                    <article th:each="job : ${jobs}"
                        class="jb-card bg-white shadow-sm p-4 d-flex align-items-center gap-4 flex-wrap">
                        <div
                            class="jb-job-logo d-inline-flex align-items-center justify-content-center text-success fs-3">
                            <i class="bi bi-briefcase"></i>
                        </div>

                        <div class="flex-grow-1" style="min-width: 220px;">
                            <a class="h5 fw-semibold text-dark text-decoration-none d-block mb-2"
                                th:href="@{'/jobs/' + ${job.id}}" th:text="${job.title}">Software Engineer</a>
                            <div class="d-flex flex-wrap gap-4 jb-meta">
                                <span><i class="bi bi-geo-alt me-1"></i><span
                                        th:text="${job.location} ?: 'California, USA'"></span></span>
                                <span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.jobType} ?: 'Part-time'"></span></span>
                                <span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.experience} ?: 'None'"></span></span>
                                <span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.qualification} ?: 'None'"></span></span>
                                <span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.minSalary} ?: 'None'"></span></span>
                                <span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.maxSalary} ?: 'None'"></span></span>
                            </div>
                            <div><span><i class="bi bi-clock me-1"></i><span
                                        th:text="${job.description} ?: 'None'"></span></span></div>
                        </div>

                        <div class="d-flex flex-column align-items-end gap-2">
                            <div class="d-flex align-items-center gap-2">
                                <button type="button"
                                    class="jb-fav d-inline-flex align-items-center justify-content-center"
                                    title="Save job">
                                    <i class="bi bi-heart-fill"></i>
                                </button>
                                <a class="btn btn-jb px-4" th:href="@{'/jobs/' + ${job.id}}">Apply Now</a>
                            </div>
                            <small class="jb-meta fst-italic">
                                Date line: <span
                                    th:text="${job.deadline != null} ? ${#temporals.format(job.deadline, 'dd MMM yyyy')} : '31 Jan 2020'">31
                                    Jan 2020</span>
                            </small>
                        </div>
                    </article>

                    <!-- empty state -->
                    <div th:if="${jobs == null or jobs.isEmpty()}"
                        class="jb-card bg-white shadow-sm p-5 text-center jb-meta">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No jobs found. Try adjusting your filters.
                    </div>

                    <nav aria-label="Page navigation example">
                        <ul class="pagination justify-content-center">
                            <li class="page-item disabled">
                                <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
                            </li>
                            <li th:each="index: ${#numbers.sequence(1, totalPage)}" class="page-item"><a
                                    class="page-link" th:href="@{/public/jobs/browse(
                                        keyword=${param.keyword},
                                        location=${param.location != null ? param.location[0] : ''},
                                        experience=${param.experience != null ? param.experience[0] : ''},
                                        jobType=${param.jobType != null ? param.jobType[0] : ''},
                                        qualification=${param.qualification != null ? param.qualification[0] : ''},
                                        priceRange=${param.priceRange != null ? param.priceRange: 0},
                                        pageNumber=${index}-1

                                    )}" th:text="${index}"></a></li>

                            <li class="page-item">
                                <a class="page-link" href="#">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </section>
        </div>
    </main>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
